# Copy this file into your module repo at .github/workflows/e2e-tests.yml and
# adjust the `with:` inputs (module_slug, module_path, test_package, cluster_config).
# Required: PR labels e2e/run, e2e/keep-cluster, e2e/label:* and the inherited
# org/repo secrets (see storage-e2e README "Enabling e2e in your module").

name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  e2e:
    # Heavy e2e runs only when the PR carries the e2e/run label.
    if: ${{ contains(github.event.pull_request.labels.*.name, 'e2e/run') }}
    uses: deckhouse/storage-e2e/.github/workflows/e2e.yml@main
    with:
      module_slug: my-module
      module_path: .
      test_package: ./tests/
      cluster_config: tests/cluster_config.yml
      # cluster_provider: dvp          # dvp (default) | commander
      # label_filter: "!stress-test"   # optional override
      # storage_e2e_ref: main          # optional
      # test_timeout: 90m              # optional
    secrets: inherit
