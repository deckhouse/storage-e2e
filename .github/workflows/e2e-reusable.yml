name: Storage E2E tests

concurrency:
  group: e2e-${{ inputs.module_slug }}-pr${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: read

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number (stable session/namespace key)"
        type: string
        required: true
      module_slug:
        description: "Module slug for TEST_CLUSTER_NAMESPACE (e.g. sds-node-configurator)"
        type: string
        required: true
      module_path:
        description: "Path to the module e2e Go module root"
        type: string
        required: true
      test_package:
        description: "Go package for run-tests"
        type: string
        required: false
        default: "./tests/"
      label_filter:
        description: "Ginkgo label filter"
        type: string
        required: false
        default: "!stress-test"
      skip_storage_e2e_replace:
        description: "Skip checkout + go mod replace of storage-e2e. Set true when the caller IS storage-e2e (avoids self-referencing replace)."
        type: boolean
        required: false
        default: false
      storage_e2e_ref:
        description: "Git ref of storage-e2e for checkout"
        type: string
        required: false
        default: "main"
      runner_labels:
        description: "JSON array of runner labels"
        type: string
        required: false
        default: '["self-hosted","regular"]'
    outputs:
      run_tests_result:
        description: "Result of run-tests job"
        value: ${{ jobs.run-tests.result }}

defaults:
  run:
    shell: bash

env:
  E2E_PR_NUMBER: ${{ inputs.pr_number }}

  E2E_CACHE_KEY: e2e-pr-${{ inputs.pr_number }}-session
  TEST_CLUSTER_NAMESPACE: e2e-${{ inputs.module_slug }}-pr${{ inputs.pr_number }}
  TEST_CLUSTER_CREATE_MODE: ${{ secrets.E2E_TEST_CLUSTER_PROVIDER || inputs.cluster_provider }}
  TEST_CLUSTER_STORAGE_CLASS: ${{ secrets.E2E_TEST_CLUSTER_STORAGE_CLASS }}
  DKP_LICENSE_KEY: ${{ secrets.E2E_DECKHOUSE_LICENSE }}
  REGISTRY_DOCKER_CFG: ${{ secrets.E2E_REGISTRY_DOCKER_CFG }}

  E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
  E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
  E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST }}
  E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER }}
  E2E_TUNNEL_SSH_JUMP_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST }}
  E2E_TUNNEL_SSH_JUMP_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER }}
  LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
  E2E_GINKGO_LABEL_FILTER: ${{ inputs.label_filter }}
  E2E_TEST_TIMEOUT: ${{ inputs.test_timeout }}

jobs:
  create-cluster:
    name: create-cluster
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 60
    steps:
      - name: Prepare workspace for checkout
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          WS="${GITHUB_WORKSPACE}"
          prune_dir() {
            local p="$1"
            [ -e "$p" ] || return 0
            chmod -R u+w "$p" 2>/dev/null || true
            rm -rf "$p" 2>/dev/null || { command -v sudo >/dev/null && sudo chmod -R u+w "$p" && sudo rm -rf "$p"; } || true
          }
          for d in .e2e-gomodcache .e2e-gocache .e2e-artifacts e2e/.gomodcache e2e/.gocache e2e/temp; do
            prune_dir "${WS}/${d}"
          done

      - name: Checkout repository
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v4
        with:
          clean: false


      - name: Setup Go
        if: ${{ !inputs.dry_run }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.skip_storage_e2e_replace && 'go.mod' || 'storage-e2e/go.mod' }}
          cache-dependency-path: ${{ inputs.skip_storage_e2e_replace && 'go.sum' || 'storage-e2e/go.sum' }}

      - name: Prepare credentials
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          E2E_SSH_KEY_PATH=$(mktemp /tmp/e2e_ssh_key.XXXXXX)
          E2E_KUBECONFIG_PATH=$(mktemp /tmp/e2e_kubeconfig.XXXXXX)

          printf '%s\n' "$E2E_SSH_PRIVATE_KEY" > "${E2E_SSH_KEY_PATH}"
          chmod 600 "${E2E_SSH_KEY_PATH}"

          printf '%s' "$E2E_CLUSTER_KUBECONFIG" | base64 -d > "${E2E_KUBECONFIG_PATH}"
          chmod 600 "${E2E_KUBECONFIG_PATH}"

          echo "E2E_SSH_KEY_PATH=${E2E_SSH_KEY_PATH}" >> "$GITHUB_ENV"
          echo "E2E_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> "$GITHUB_ENV"
          echo "E2E_DVP_BASE_CLUSTER_SSH_KEY_PATH=${E2E_SSH_KEY_PATH}" >> "$GITHUB_ENV"
          echo "E2E_DVP_BASE_CLUSTER_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> "$GITHUB_ENV"
        env:
          E2E_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_CLUSTER_KUBECONFIG: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}

      - name: Bootstrap cluster
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ inputs.skip_storage_e2e_replace && '.' || 'storage-e2e' }}
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_TEST_CLUSTER_PROVIDER: ${{ secrets.E2E_DVP_CLUSTER_PROVIDER }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ inputs.cluster_config }}
          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER }}
          E2E_DVP_BASE_CLUSTER_NAMESPACE: e2e-${{ inputs.module_slug }}-pr${{ inputs.pr_number }}-${{ github.run_id }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          if [ -z "${E2E_CLUSTER_CONFIG_YAML_PATH:-}" ]; then
            echo "::error::cluster_config input is required for create-cluster (E2E_CLUSTER_CONFIG_YAML_PATH)"
            exit 1
          fi
          go run ./cmd/bootstrap-cluster

      - name: Cleanup temp credentials
        if: ${{ always() && !inputs.dry_run }}
        run: rm -f "${E2E_SSH_KEY_PATH:-}" "${E2E_KUBECONFIG_PATH:-}" 2>/dev/null || true

  run-tests:
    name: run-tests
    needs: create-cluster
    if: ${{ inputs.dry_run || needs.create-cluster.result == 'success' }}
    timeout-minutes: 240
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    env:
      TEST_CLUSTER_CLEANUP: "false"
      CI: "true"
    permissions:
      checks: write
      contents: read
    steps:
      - name: Prepare workspace for checkout
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          WS="${GITHUB_WORKSPACE}"
          prune_dir() {
            local p="$1"
            [ -e "$p" ] || return 0
            chmod -R u+w "$p" 2>/dev/null || true
            rm -rf "$p" 2>/dev/null || { command -v sudo >/dev/null && sudo chmod -R u+w "$p" && sudo rm -rf "$p"; } || true
          }
          for d in .e2e-gomodcache .e2e-gocache .e2e-artifacts e2e/.gomodcache e2e/.gocache e2e/temp; do
            prune_dir "${WS}/${d}"
          done

      - name: Checkout repository
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Checkout storage-e2e
        if: ${{ !inputs.dry_run && !inputs.skip_storage_e2e_replace }}
        uses: actions/checkout@v4
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: storage-e2e
          clean: false

      - name: Setup Go
        if: ${{ !inputs.dry_run && !inputs.skip_storage_e2e_replace }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.module_path }}/go.mod
          cache-dependency-path: |
            ${{ inputs.module_path }}/go.sum
            storage-e2e/go.sum

      - name: Setup Go (self-hosted storage-e2e)
        if: ${{ !inputs.dry_run && inputs.skip_storage_e2e_replace }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.module_path }}/go.mod
          cache-dependency-path: ${{ inputs.module_path }}/go.sum

      - name: Setup test environment
        if: ${{ !inputs.dry_run }}
        run: |
          E2E_SSH_KEY_PATH=$(mktemp /tmp/e2e_ssh_key.XXXXXX)
          E2E_SSH_PUB_PATH=$(mktemp /tmp/e2e_ssh_pub.XXXXXX)
          E2E_KUBECONFIG_PATH=$(mktemp /tmp/e2e_kubeconfig.XXXXXX)
          echo "E2E_SSH_KEY_PATH=${E2E_SSH_KEY_PATH}" >> "$GITHUB_ENV"
          echo "E2E_SSH_PUB_PATH=${E2E_SSH_PUB_PATH}" >> "$GITHUB_ENV"
          echo "E2E_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> "$GITHUB_ENV"

          printf '%s\n' "$E2E_SSH_PRIVATE_KEY" > "${E2E_SSH_KEY_PATH}"
          chmod 600 "${E2E_SSH_KEY_PATH}"
          echo "SSH_PRIVATE_KEY=${E2E_SSH_KEY_PATH}" >> "$GITHUB_ENV"

          if [ -n "${E2E_SSH_PUBLIC_KEY:-}" ]; then
            printf '%s\n' "$E2E_SSH_PUBLIC_KEY" > "${E2E_SSH_PUB_PATH}"
            chmod 644 "${E2E_SSH_PUB_PATH}"
            echo "SSH_PUBLIC_KEY=${E2E_SSH_PUB_PATH}" >> "$GITHUB_ENV"
          fi

          if [ -n "${E2E_CLUSTER_KUBECONFIG:-}" ]; then
            printf '%s' "$E2E_CLUSTER_KUBECONFIG" | base64 -d > "${E2E_KUBECONFIG_PATH}"
            chmod 600 "${E2E_KUBECONFIG_PATH}"
            echo "KUBE_CONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> "$GITHUB_ENV"
          fi

          TEST_NAMESPACE="e2e-${{ inputs.module_slug }}-pr${{ inputs.pr_number }}-${{ github.run_id }}"
          echo "TEST_NAMESPACE=${TEST_NAMESPACE}" >> "$GITHUB_ENV"
          echo "Namespace: ${TEST_NAMESPACE}"
        env:
          E2E_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_SSH_PUBLIC_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PUBLIC_KEY }}
          E2E_CLUSTER_KUBECONFIG: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}

      - name: Run E2E tests (build_dev-compatible flow)
        if: ${{ !inputs.dry_run }}
        id: run_tests
        working-directory: ${{ inputs.module_path }}
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          TEST_CLUSTER_CREATE_MODE: ${{ secrets.E2E_TEST_CLUSTER_CREATE_MODE || inputs.cluster_provider }}
          TEST_CLUSTER_NAMESPACE: e2e-${{ inputs.module_slug }}-pr${{ inputs.pr_number }}-${{ github.run_id }}
          TEST_CLUSTER_STORAGE_CLASS: ${{ secrets.E2E_TEST_CLUSTER_STORAGE_CLASS }}
          DKP_LICENSE_KEY: ${{ secrets.E2E_DECKHOUSE_LICENSE }}
          REGISTRY_DOCKER_CFG: ${{ secrets.E2E_REGISTRY_DOCKER_CFG }}
          SSH_HOST: ${{ secrets.E2E_SSH_HOST }}
          SSH_USER: ${{ secrets.E2E_SSH_USER }}
          SSH_JUMP_HOST: ${{ secrets.E2E_SSH_JUMP_HOST }}
          SSH_JUMP_USER: ${{ secrets.E2E_SSH_JUMP_USER }}
          SSH_VM_USER: ${{ secrets.SSH_VM_USER }}
          E2E_TUNNEL_SSH_JUMP_HOST: ${{ secrets.E2E_SSH_JUMP_HOST }}
          E2E_TUNNEL_SSH_JUMP_USER: ${{ secrets.E2E_SSH_JUMP_USER }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          if [ "${{ inputs.skip_storage_e2e_replace }}" != "true" ]; then
            go mod edit -replace=github.com/deckhouse/storage-e2e=${{ github.workspace }}/storage-e2e
          fi

          E2E_SSH_TUNNEL_PID=""
          e2e_stop_ssh_tunnel() {
            if [ -n "${E2E_SSH_TUNNEL_PID:-}" ]; then
              kill "${E2E_SSH_TUNNEL_PID}" 2>/dev/null || true
              wait "${E2E_SSH_TUNNEL_PID}" 2>/dev/null || true
            fi
          }
          trap e2e_stop_ssh_tunnel EXIT

          E2E_KC_FILE="${E2E_KUBECONFIG_PATH:-${KUBE_CONFIG_PATH:-}}"
          E2E_NEED_TUNNEL=false
          E2E_LOCAL_API_PORT=""
          SERVER_LINE=""
          if [ -n "${E2E_KC_FILE}" ] && [ -f "${E2E_KC_FILE}" ]; then
            SERVER_LINE="$(grep -F 'server:' "${E2E_KC_FILE}" | grep -E '127\.0\.0\.1|localhost|\[::1\]' | head -1 || true)"
            if [ -n "${SERVER_LINE}" ]; then
              E2E_NEED_TUNNEL=true
              E2E_LOCAL_API_PORT="$(printf '%s' "${SERVER_LINE}" | sed -n 's/.*127\.0\.0\.1:\([0-9][0-9]*\).*/\1/p')"
              if [ -z "${E2E_LOCAL_API_PORT}" ]; then
                E2E_LOCAL_API_PORT="$(printf '%s' "${SERVER_LINE}" | sed -n 's/.*localhost:\([0-9][0-9]*\).*/\1/p')"
              fi
              if [ -z "${E2E_LOCAL_API_PORT}" ]; then
                E2E_LOCAL_API_PORT="$(printf '%s' "${SERVER_LINE}" | sed -n 's/.*\[::1\]:\([0-9][0-9]*\).*/\1/p')"
              fi
              [ -z "${E2E_LOCAL_API_PORT}" ] && E2E_LOCAL_API_PORT=6445
            fi
          fi

          if [ "${E2E_NEED_TUNNEL}" = true ] && [ -n "${SSH_HOST:-}" ] && [ -n "${SSH_USER:-}" ] && [ -f "${E2E_SSH_KEY_PATH:-}" ]; then
            SSH_OPTS="-N -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
            TUNNEL_JUMP_USER="${E2E_TUNNEL_SSH_JUMP_USER:-$SSH_USER}"
            if [ -n "${E2E_TUNNEL_SSH_JUMP_HOST:-}" ]; then
              ssh ${SSH_OPTS} -i "${E2E_SSH_KEY_PATH}" \
                -J "${TUNNEL_JUMP_USER}@${E2E_TUNNEL_SSH_JUMP_HOST}" \
                -L "${E2E_LOCAL_API_PORT}:127.0.0.1:6445" "${SSH_USER}@${SSH_HOST}" &
            else
              ssh ${SSH_OPTS} -i "${E2E_SSH_KEY_PATH}" \
                -L "${E2E_LOCAL_API_PORT}:127.0.0.1:6445" "${SSH_USER}@${SSH_HOST}" &
            fi
            E2E_SSH_TUNNEL_PID=$!
            sleep 3
          elif [ "${E2E_NEED_TUNNEL}" = true ]; then
            echo "::error::Kubeconfig uses loopback API but SSH tunnel params are missing"
            exit 1
          fi

          go mod download
          go mod tidy

          if [ -z "${E2E_GINKGO_LABEL_FILTER:-}" ]; then
            export E2E_GINKGO_LABEL_FILTER="!stress-test"
          fi

          if [ -n "${GOMODCACHE:-}" ] && [ -d "${GOMODCACHE}/github.com/deckhouse" ]; then
            shopt -s nullglob
            for d in "${GOMODCACHE}"/github.com/deckhouse/storage-e2e@*; do
              if [ -d "${d}" ]; then
                chmod -R u+w "${d}" || true
                mkdir -p "${d}/temp/cluster" || true
                chmod -R u+w "${d}/temp" 2>/dev/null || true
              fi
            done
            shopt -u nullglob
          fi

          RAW_E2E_TEST_TIMEOUT="${E2E_TEST_TIMEOUT:-3h30m}"
          if [[ "${RAW_E2E_TEST_TIMEOUT}" =~ ^([0-9]+h)?([0-9]+m)?([0-9]+s)?$ ]]; then
            H="${BASH_REMATCH[1]%h}"
            M="${BASH_REMATCH[2]%m}"
            S="${BASH_REMATCH[3]%s}"
            H="${H:-0}"
            M="${M:-0}"
            S="${S:-0}"
            TOTAL_SECONDS=$((10#${H} * 3600 + 10#${M} * 60 + 10#${S}))
            if [ "${TOTAL_SECONDS}" -lt 5400 ]; then
              export E2E_TEST_TIMEOUT="90m"
            else
              export E2E_TEST_TIMEOUT="${RAW_E2E_TEST_TIMEOUT}"
            fi
          else
            export E2E_TEST_TIMEOUT="90m"
          fi
          E2E_GO_TEST_TIMEOUT="3h30m"
          echo "Ginkgo label filter: ${E2E_GINKGO_LABEL_FILTER}"
          echo "go test -timeout: ${E2E_GO_TEST_TIMEOUT} (Ginkgo suite: ${E2E_TEST_TIMEOUT})"
          go test -v -count=1 -timeout "${E2E_GO_TEST_TIMEOUT}" "${{ inputs.test_package }}" -run '^${{ inputs.test_suite }}$' \
            -ginkgo.label-filter="${E2E_GINKGO_LABEL_FILTER}" 2>&1 | tee "${GITHUB_WORKSPACE}/e2e-test-output.log"
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "${TEST_EXIT_CODE}" > "${GITHUB_WORKSPACE}/e2e-test-exit-code.txt"
          exit "${TEST_EXIT_CODE}"

      - name: Upload E2E logs
        uses: actions/upload-artifact@v4
        if: ${{ always() && !inputs.dry_run }}
        with:
          name: e2e-test-logs-${{ inputs.module_slug }}-${{ github.run_id }}
          path: ${{ github.workspace }}/e2e-test-output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup test resources
        if: ${{ always() && !inputs.dry_run }}
        env:
          SSH_HOST: ${{ secrets.E2E_SSH_HOST }}
          SSH_USER: ${{ secrets.E2E_SSH_USER }}
          SSH_JUMP_HOST: ${{ secrets.E2E_SSH_JUMP_HOST }}
          SSH_JUMP_USER: ${{ secrets.E2E_SSH_JUMP_USER }}
        run: |
          SSH_TUNNEL_PID=""
          if [ -z "${E2E_KUBECONFIG_PATH:-}" ] || [ ! -f "${E2E_KUBECONFIG_PATH}" ]; then
            echo "No kubeconfig, skip cleanup"
          else
            if [ -n "${SSH_HOST}" ] && [ -n "${SSH_USER}" ] && [ -f "${E2E_SSH_KEY_PATH}" ]; then
              if [ -n "${SSH_JUMP_HOST}" ]; then
                JUMP_USER="${SSH_JUMP_USER:-$SSH_USER}"
                ssh -N -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i "${E2E_SSH_KEY_PATH}" -J "${JUMP_USER}@${SSH_JUMP_HOST}" -L 6445:127.0.0.1:6445 "${SSH_USER}@${SSH_HOST}" &
              else
                ssh -N -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i "${E2E_SSH_KEY_PATH}" -L 6445:127.0.0.1:6445 "${SSH_USER}@${SSH_HOST}" &
              fi
              SSH_TUNNEL_PID=$!
              sleep 2
            fi
            export KUBECONFIG="${E2E_KUBECONFIG_PATH}"
            kubectl delete namespace "${TEST_NAMESPACE}" --ignore-not-found=true --timeout=5m 2>/dev/null || true
            kubectl delete vd -n "${TEST_NAMESPACE}" --all --ignore-not-found=true --timeout=2m 2>/dev/null || true
            kubectl delete vm -n "${TEST_NAMESPACE}" --all --ignore-not-found=true --timeout=2m 2>/dev/null || true
          fi
          if [ -n "${SSH_TUNNEL_PID}" ]; then
            kill "${SSH_TUNNEL_PID}" 2>/dev/null || true
          fi

      - name: Cleanup temp credentials
        if: ${{ always() && !inputs.dry_run }}
        run: rm -f "${E2E_SSH_KEY_PATH}" "${E2E_SSH_PUB_PATH}" "${E2E_KUBECONFIG_PATH}" 2>/dev/null || true

  teardown-cluster:
    name: teardown-cluster
    needs: [ create-cluster, run-tests ]
    if: ${{ always() && (needs.create-cluster.result == 'success' || needs.create-cluster.result == 'failure') }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 60
    steps:
      - name: teardown-cluster (mocked)
        if: ${{ inputs.dry_run }}
        run: |
          echo "teardown-cluster is mocked (dry_run)"
          echo "PR: ${{ inputs.pr_number }}, module: ${{ inputs.module_slug }}"

      - name: Prepare workspace for checkout (self-hosted)
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          WS="${GITHUB_WORKSPACE}"
          prune_dir() {
            local p="$1"
            [ -e "$p" ] || return 0
            chmod -R u+w "$p" 2>/dev/null || true
            rm -rf "$p" 2>/dev/null || { command -v sudo >/dev/null && sudo chmod -R u+w "$p" && sudo rm -rf "$p"; } || true
          }
          for d in .e2e-gomodcache .e2e-gocache .e2e-artifacts e2e/.gomodcache e2e/.gocache e2e/temp; do
            prune_dir "${WS}/${d}"
          done

      - name: Checkout repository
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Checkout storage-e2e
        if: ${{ !inputs.dry_run && !inputs.skip_storage_e2e_replace }}
        uses: actions/checkout@v4
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: storage-e2e
          clean: false

      - name: Setup Go
        if: ${{ !inputs.dry_run }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.skip_storage_e2e_replace && 'go.mod' || 'storage-e2e/go.mod' }}
          cache-dependency-path: ${{ inputs.skip_storage_e2e_replace && 'go.sum' || 'storage-e2e/go.sum' }}

      - name: Prepare credentials
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          E2E_SSH_KEY_PATH=$(mktemp /tmp/e2e_ssh_key.XXXXXX)
          E2E_KUBECONFIG_PATH=$(mktemp /tmp/e2e_kubeconfig.XXXXXX)

          printf '%s\n' "$E2E_SSH_PRIVATE_KEY" > "${E2E_SSH_KEY_PATH}"
          chmod 600 "${E2E_SSH_KEY_PATH}"

          printf '%s' "$E2E_CLUSTER_KUBECONFIG" | base64 -d > "${E2E_KUBECONFIG_PATH}"
          chmod 600 "${E2E_KUBECONFIG_PATH}"

          echo "E2E_SSH_KEY_PATH=${E2E_SSH_KEY_PATH}" >> "$GITHUB_ENV"
          echo "E2E_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> "$GITHUB_ENV"
          echo "E2E_DVP_BASE_CLUSTER_SSH_KEY_PATH=${E2E_SSH_KEY_PATH}" >> "$GITHUB_ENV"
          echo "E2E_DVP_BASE_CLUSTER_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> "$GITHUB_ENV"
        env:
          E2E_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_CLUSTER_KUBECONFIG: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}

      - name: Remove cluster
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ inputs.skip_storage_e2e_replace && '.' || 'storage-e2e' }}
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_TEST_CLUSTER_PROVIDER: ${{ secrets.E2E_DVP_CLUSTER_PROVIDER || 'dvp' }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ inputs.cluster_config }}
          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_JUMP_USER }}
          E2E_DVP_BASE_CLUSTER_NAMESPACE: e2e-${{ inputs.module_slug }}-pr${{ inputs.pr_number }}-${{ github.run_id }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          go run ./cmd/remove-cluster

      - name: Cleanup temp credentials
        if: ${{ always() && !inputs.dry_run }}
        run: rm -f "${E2E_SSH_KEY_PATH:-}" "${E2E_KUBECONFIG_PATH:-}" 2>/dev/null || true
