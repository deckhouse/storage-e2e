name: E2E

on:
  pull_request:
    paths:
      - '.github/workflows/e2e-reusable.yml'
      - '.github/scripts/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

concurrency:
  group: e2e-self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    uses: ./.github/workflows/e2e-reusable.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      module_slug: storage-e2e
      module_path: .
      test_package: ./tests/test-template/
      skip_storage_e2e_replace: true
      runner_labels: '["self-hosted","regular"]'
    secrets: inherit
