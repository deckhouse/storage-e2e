name: E2E

on:
  workflow_call:
    inputs:
      module_slug:
        description: "Module slug used in the namespace (e.g. csi-ceph)"
        type: string
        required: true
      module_path:
        description: "Path to the Go module containing the tests"
        type: string
        required: false
        default: "."
      test_package:
        description: "Go package to test"
        type: string
        required: false
        default: "./tests/"
      label_filter:
        description: "Default Ginkgo filter when no e2e/label:* labels are present"
        type: string
        required: false
        default: "!stress-test"
      cluster_config:
        description: "Path (relative to the module repo) to the cluster YAML definition"
        type: string
        required: true
      cluster_provider:
        description: "Cluster provider used by bootstrap/teardown: dvp | commander"
        type: string
        required: false
        default: "dvp"
      module_image_tag:
        description: "Image tag for the module under test, exposed to enable-modules as E2E_MODULE_IMAGE_TAG so cluster_config modulePullOverride can reference ${E2E_MODULE_IMAGE_TAG} (e.g. pr<N>)"
        type: string
        required: false
        default: ""
      storage_e2e_ref:
        description: "Git ref of storage-e2e to checkout"
        type: string
        required: false
        default: "main"
      runner_labels:
        description: "JSON array of runner labels"
        type: string
        required: false
        default: '["self-hosted","regular"]'
      test_timeout:
        description: "Reserved: Ginkgo/go test timeout (not yet wired; see docs/CI.md)"
        type: string
        required: false
        default: "90m"

concurrency:
  group: e2e-${{ inputs.module_slug }}-pr${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  resolve:
    name: resolve
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    outputs:
      keep_cluster: ${{ steps.resolve.outputs.keep_cluster }}
      ginkgo_filter: ${{ steps.resolve.outputs.ginkgo_filter }}
      namespace: ${{ steps.resolve.outputs.namespace }}
    steps:
      - name: Checkout storage-e2e scripts (sparse)
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _se2e-scripts
          sparse-checkout: .github/scripts

      - name: Resolve labels
        id: resolve
        env:
          E2E_PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          E2E_MODULE_SLUG: ${{ inputs.module_slug }}
          E2E_PR_NUMBER: ${{ github.event.pull_request.number }}
          E2E_DEFAULT_LABEL_FILTER: ${{ inputs.label_filter }}
        run: bash _se2e-scripts/.github/scripts/e2e-resolve-labels.sh

  bootstrap:
    name: bootstrap
    needs: resolve
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    # Commander cluster-create + Ready wait can take up to ~60m; keep headroom.
    timeout-minutes: 90
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v7
        with:
          clean: false

      - name: Checkout storage-e2e
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _storage-e2e
          clean: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: _storage-e2e/go.mod
          cache: false

      # Prune stale Go-cache trees on the self-hosted runner (provider-agnostic).
      # Credentials are no longer materialized to disk: the DVP provider consumes
      # the SSH key + kubeconfig as inline content (see env below).
      - name: Prune stale workspace caches
        run: bash _storage-e2e/.github/scripts/e2e-prune-workspace.sh

      # The commander provider fetches the new cluster's kubeconfig over SSH
      # (the Commander API does not expose it), typically via a jump host, so the
      # SSH key secret is materialized to disk here.
      - name: Materialize commander SSH key
        if: ${{ inputs.cluster_provider == 'commander' }}
        env:
          E2E_COMMANDER_SSH_PRIVATE_KEY: ${{ secrets.E2E_COMMANDER_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          key_path="$(mktemp "${RUNNER_TEMP:-/tmp}/e2e_commander_ssh_key.XXXXXX")"
          printf '%s\n' "${E2E_COMMANDER_SSH_PRIVATE_KEY:?E2E_COMMANDER_SSH_PRIVATE_KEY is required for the commander provider}" >"$key_path"
          chmod 600 "$key_path"
          echo "E2E_COMMANDER_SSH_PRIVATE_KEY_PATH=${key_path}" >>"$GITHUB_ENV"

      - name: Bootstrap cluster
        working-directory: _storage-e2e
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_TEST_CLUSTER_PROVIDER: ${{ inputs.cluster_provider }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ github.workspace }}/${{ inputs.cluster_config }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}

          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE }}
          E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_DVP_BASE_CLUSTER_NAMESPACE: ${{ needs.resolve.outputs.namespace }}
          E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}
          E2E_DVP_BASE_CLUSTER_STORAGE_CLASS: ${{ secrets.E2E_DVP_BASE_CLUSTER_STORAGE_CLASS }}
          # Commander provider env (used when cluster_provider == commander).
          # Typed/defaulted fields use `|| <default>` so an unset var never
          # renders as an empty string that would override the Go-side default.
          E2E_COMMANDER_URL: ${{ secrets.E2E_COMMANDER_URL }}
          E2E_COMMANDER_TOKEN: ${{ secrets.E2E_COMMANDER_TOKEN }}
          E2E_COMMANDER_CLUSTER_NAME: ${{ needs.resolve.outputs.namespace }}
          E2E_COMMANDER_TEMPLATE_NAME: ${{ secrets.E2E_COMMANDER_TEMPLATE_NAME }}
          E2E_COMMANDER_TEMPLATE_VERSION: ${{ vars.E2E_COMMANDER_TEMPLATE_VERSION }}
          E2E_COMMANDER_REGISTRY_NAME: ${{ vars.E2E_COMMANDER_REGISTRY_NAME }}
          E2E_COMMANDER_VALUES: ${{ vars.E2E_COMMANDER_VALUES }}
          E2E_COMMANDER_CA_CERT: ${{ secrets.E2E_COMMANDER_CA_CERT }}
          E2E_COMMANDER_AUTH_METHOD: ${{ vars.E2E_COMMANDER_AUTH_METHOD || 'x-auth-token' }}
          E2E_COMMANDER_API_PREFIX: ${{ vars.E2E_COMMANDER_API_PREFIX || '/api/v1' }}
          E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY: ${{ vars.E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY || 'false' }}
          E2E_COMMANDER_WAIT_TIMEOUT: ${{ vars.E2E_COMMANDER_WAIT_TIMEOUT || '60m' }}
          # SSH fallback for kubeconfig retrieval (Commander API does not expose
          # it). Master host/user come from Commander; key + jump host from here.
          E2E_COMMANDER_SSH_PRIVATE_KEY_PATH: ${{ env.E2E_COMMANDER_SSH_PRIVATE_KEY_PATH }}
          E2E_COMMANDER_SSH_USER: ${{ vars.E2E_COMMANDER_SSH_USER }}
          E2E_COMMANDER_SSH_JUMP_HOST: ${{ vars.E2E_COMMANDER_SSH_JUMP_HOST }}
          E2E_COMMANDER_SSH_JUMP_USER: ${{ vars.E2E_COMMANDER_SSH_JUMP_USER }}
          # Commander provider writes the new cluster's kubeconfig here; the step
          # below uploads it so enable-modules and run-tests can reach the cluster.
          E2E_COMMANDER_KUBECONFIG_OUT: ${{ github.workspace }}/e2e-kubeconfig.yml
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          # DVP: decode the base64 kubeconfig secret into inline content. Empty
          # for non-DVP providers (commander), which simply ignore it.
          E2E_DVP_BASE_CLUSTER_KUBECONFIG="$(printf '%s' "${E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64}" | base64 -d)"
          export E2E_DVP_BASE_CLUSTER_KUBECONFIG
          go run ./cmd/bootstrap-cluster

      # The kubeconfig is short-lived (the cluster is removed at teardown) but is
      # cluster-admin material, so retention is kept to 1 day.
      - name: Upload cluster kubeconfig
        if: ${{ inputs.cluster_provider == 'commander' }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-kubeconfig-${{ inputs.module_slug }}-pr${{ github.event.pull_request.number }}
          # Includes the .sshinfo sidecar (master host/user) used to open the API tunnel.
          path: ${{ github.workspace }}/e2e-kubeconfig.yml*
          retention-days: 1
          if-no-files-found: error

      - name: Cleanup commander SSH key
        if: ${{ always() && inputs.cluster_provider == 'commander' }}
        run: rm -f "${E2E_COMMANDER_SSH_PRIVATE_KEY_PATH:-}" 2>/dev/null || true

  run-tests:
    name: run-tests
    needs: [resolve, bootstrap]
    if: ${{ needs.bootstrap.result == 'success' }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 240
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v7
        with:
          clean: false

      - name: Checkout storage-e2e
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _storage-e2e
          clean: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.module_path }}/go.mod
          cache: false

      # Commander: connect the suite to the bootstrapped cluster via its
      # kubeconfig, reached through an SSH tunnel to the master (the kubeconfig
      # server is the node-local 127.0.0.1:<port>). ALL commander wiring lives in
      # the commander-gated steps below, so for other providers (dvp, …) the
      # "Run E2E tests" step runs with exactly its previous environment.
      - name: Download cluster kubeconfig
        if: ${{ inputs.cluster_provider == 'commander' }}
        uses: actions/download-artifact@v7
        with:
          name: e2e-kubeconfig-${{ inputs.module_slug }}-pr${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}

      - name: Materialize commander SSH key
        if: ${{ inputs.cluster_provider == 'commander' }}
        env:
          E2E_COMMANDER_SSH_PRIVATE_KEY: ${{ secrets.E2E_COMMANDER_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          key_path="$(mktemp "${RUNNER_TEMP:-/tmp}/e2e_commander_ssh_key.XXXXXX")"
          printf '%s\n' "${E2E_COMMANDER_SSH_PRIVATE_KEY:?}" >"$key_path"
          chmod 600 "$key_path"
          echo "E2E_COMMANDER_SSH_PRIVATE_KEY_PATH=${key_path}" >>"$GITHUB_ENV"

      # Opens a detached SSH tunnel (persists across steps) and injects the suite
      # connection env via $GITHUB_ENV. Skipped for other providers, leaving the
      # run-tests step's environment untouched.
      - name: Open API tunnel and configure connection
        if: ${{ inputs.cluster_provider == 'commander' }}
        env:
          E2E_KUBECONFIG: ${{ github.workspace }}/e2e-kubeconfig.yml
          JUMP_HOST: ${{ vars.E2E_COMMANDER_SSH_JUMP_HOST }}
          JUMP_USER: ${{ vars.E2E_COMMANDER_SSH_JUMP_USER }}
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/_storage-e2e/.github/scripts/e2e-api-tunnel.sh"
          open_api_tunnel
          {
            echo "TEST_CLUSTER_CREATE_MODE=kubeconfig"
            echo "KUBE_CONFIG_PATH=${E2E_KUBECONFIG}"
            echo "TEST_CLUSTER_NAMESPACE=${{ needs.resolve.outputs.namespace }}"
          } >>"$GITHUB_ENV"

      # Enable the module-under-test on the freshly created cluster, over the
      # tunnel opened above (ModuleConfig + ModulePullOverride from cluster_config,
      # driven by the same EnableAndConfigureModules used by the other flows). Runs
      # in the run-tests job so it reuses the one tunnel; skipped for other providers.
      - name: Enable and configure modules
        if: ${{ inputs.cluster_provider == 'commander' }}
        working-directory: _storage-e2e
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ github.workspace }}/${{ inputs.cluster_config }}
          # Exposed for cluster_config modulePullOverride: "${E2E_MODULE_IMAGE_TAG}".
          E2E_MODULE_IMAGE_TAG: ${{ inputs.module_image_tag }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          # KUBE_CONFIG_PATH was exported to $GITHUB_ENV by the tunnel step above.
          go run ./cmd/enable-modules

      - name: Run E2E tests
        id: run_tests
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_MODULE_PATH: ${{ inputs.module_path }}
          E2E_TEST_PACKAGE: ${{ inputs.test_package }}
          E2E_GINKGO_LABEL_FILTER: ${{ needs.resolve.outputs.ginkgo_filter }}
          E2E_STORAGE_E2E_DIR: ${{ github.workspace }}/_storage-e2e
          E2E_GO_TEST_TIMEOUT: "3h30m"
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          bash _storage-e2e/.github/scripts/e2e-run-tests.sh

      - name: Close API tunnel
        if: ${{ always() && inputs.cluster_provider == 'commander' }}
        run: |
          source "${GITHUB_WORKSPACE}/_storage-e2e/.github/scripts/e2e-api-tunnel.sh"
          close_api_tunnel

      - name: Upload E2E logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-logs-${{ inputs.module_slug }}-pr${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}/e2e-test-output.log
          retention-days: 7
          if-no-files-found: ignore

  teardown:
    name: teardown
    needs: [resolve, bootstrap, run-tests]
    if: ${{ always() && needs.bootstrap.result == 'success' && needs.resolve.outputs.keep_cluster != 'true' }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 60
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v7
        with:
          clean: false

      - name: Checkout storage-e2e
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _storage-e2e
          clean: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: _storage-e2e/go.mod
          cache: false

      - name: Prune stale workspace caches
        run: bash _storage-e2e/.github/scripts/e2e-prune-workspace.sh

      - name: Remove cluster
        working-directory: _storage-e2e
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_TEST_CLUSTER_PROVIDER: ${{ inputs.cluster_provider }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ github.workspace }}/${{ inputs.cluster_config }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
          # DVP provider env (used when cluster_provider == dvp).
          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE }}
          E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_DVP_BASE_CLUSTER_NAMESPACE: ${{ needs.resolve.outputs.namespace }}
          # KUBECONFIG secret is base64-encoded; decoded to inline content below.
          E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}
          # Commander provider env (used when cluster_provider == commander).
          # The cluster name MUST match the bootstrap job so the right cluster
          # is deleted: both use the per-PR namespace as the cluster name.
          E2E_COMMANDER_URL: ${{ secrets.E2E_COMMANDER_URL }}
          E2E_COMMANDER_TOKEN: ${{ secrets.E2E_COMMANDER_TOKEN }}
          E2E_COMMANDER_CLUSTER_NAME: ${{ needs.resolve.outputs.namespace }}
          E2E_COMMANDER_TEMPLATE_NAME: ${{ secrets.E2E_COMMANDER_TEMPLATE_NAME }}
          E2E_COMMANDER_CA_CERT: ${{ secrets.E2E_COMMANDER_CA_CERT }}
          E2E_COMMANDER_AUTH_METHOD: ${{ vars.E2E_COMMANDER_AUTH_METHOD || 'x-auth-token' }}
          E2E_COMMANDER_API_PREFIX: ${{ vars.E2E_COMMANDER_API_PREFIX || '/api/v1' }}
          E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY: ${{ vars.E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY || 'false' }}
          E2E_COMMANDER_WAIT_TIMEOUT: ${{ vars.E2E_COMMANDER_WAIT_TIMEOUT || '60m' }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          # DVP: decode the base64 kubeconfig secret into inline content. Empty
          # for non-DVP providers (commander), which simply ignore it.
          E2E_DVP_BASE_CLUSTER_KUBECONFIG="$(printf '%s' "${E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64}" | base64 -d)"
          export E2E_DVP_BASE_CLUSTER_KUBECONFIG
          go run ./cmd/remove-cluster
