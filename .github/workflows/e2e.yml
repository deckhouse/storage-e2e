name: E2E

on:
  workflow_call:
    inputs:
      module_slug:
        description: "Module slug used in the namespace (e.g. csi-ceph)"
        type: string
        required: true
      module_path:
        description: "Path to the Go module containing the tests"
        type: string
        required: false
        default: "."
      test_package:
        description: "Go package to test"
        type: string
        required: false
        default: "./tests/"
      label_filter:
        description: "Default Ginkgo filter when no e2e/label:* labels are present"
        type: string
        required: false
        default: "!stress-test"
      cluster_config:
        description: "Path (relative to the module repo) to the cluster YAML definition"
        type: string
        required: true
      cluster_provider:
        description: "Cluster provider used by bootstrap/teardown: dvp | commander"
        type: string
        required: false
        default: "dvp"
      module_image_tag:
        description: "Image tag for the module under test, exposed to enable-modules as E2E_MODULE_IMAGE_TAG so cluster_config modulePullOverride can reference ${E2E_MODULE_IMAGE_TAG} (e.g. pr<N>)"
        type: string
        required: false
        default: ""
      storage_e2e_ref:
        description: "Git ref of storage-e2e to checkout"
        type: string
        required: false
        default: "main"
      runner_labels:
        description: "JSON array of runner labels"
        type: string
        required: false
        default: '["self-hosted","regular"]'
      test_timeout:
        description: "Reserved: Ginkgo/go test timeout (not yet wired; see docs/CI.md)"
        type: string
        required: false
        default: "90m"

concurrency:
  group: e2e-${{ inputs.module_slug }}-pr${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  resolve:
    name: resolve
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    outputs:
      keep_cluster: ${{ steps.resolve.outputs.keep_cluster }}
      ginkgo_filter: ${{ steps.resolve.outputs.ginkgo_filter }}
      namespace: ${{ steps.resolve.outputs.namespace }}
    steps:
      - name: Checkout storage-e2e scripts (sparse)
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _se2e-scripts
          sparse-checkout: .github/scripts

      - name: Resolve labels
        id: resolve
        env:
          E2E_PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          E2E_MODULE_SLUG: ${{ inputs.module_slug }}
          E2E_PR_NUMBER: ${{ github.event.pull_request.number }}
          E2E_DEFAULT_LABEL_FILTER: ${{ inputs.label_filter }}
        run: bash _se2e-scripts/.github/scripts/e2e-resolve-labels.sh

  bootstrap:
    name: bootstrap
    needs: resolve
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    # Commander cluster-create + Ready wait can take up to ~60m; keep headroom.
    timeout-minutes: 90
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v7
        with:
          clean: true

      - name: Checkout storage-e2e
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _storage-e2e
          clean: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: _storage-e2e/go.mod
          cache: false

      - name: Prune stale workspace caches
        run: bash _storage-e2e/.github/scripts/e2e-prune-workspace.sh

      - name: Bootstrap cluster
        working-directory: _storage-e2e
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_TEST_CLUSTER_PROVIDER: ${{ inputs.cluster_provider }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ github.workspace }}/${{ inputs.cluster_config }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}

          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE }}
          E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_DVP_BASE_CLUSTER_NAMESPACE: ${{ needs.resolve.outputs.namespace }}
          E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}
          E2E_DVP_BASE_CLUSTER_STORAGE_CLASS: ${{ secrets.E2E_DVP_BASE_CLUSTER_STORAGE_CLASS }}
          E2E_DVP_DKP_LICENSE_KEY: ${{ secrets.E2E_DVP_DKP_LICENSE_KEY }}
          E2E_DVP_REGISTRY_DOCKER_CFG: ${{ secrets.E2E_DVP_REGISTRY_DOCKER_CFG }}
          # Commander provider env (used when cluster_provider == commander).
          # Typed/defaulted fields use `|| <default>` so an unset var never
          # renders as an empty string that would override the Go-side default.
          E2E_COMMANDER_URL: ${{ secrets.E2E_COMMANDER_URL }}
          E2E_COMMANDER_TOKEN: ${{ secrets.E2E_COMMANDER_TOKEN }}
          E2E_COMMANDER_CLUSTER_NAME: ${{ needs.resolve.outputs.namespace }}
          E2E_COMMANDER_TEMPLATE_NAME: ${{ secrets.E2E_COMMANDER_TEMPLATE_NAME }}
          E2E_COMMANDER_TEMPLATE_VERSION: ${{ vars.E2E_COMMANDER_TEMPLATE_VERSION }}
          E2E_COMMANDER_REGISTRY_NAME: ${{ vars.E2E_COMMANDER_REGISTRY_NAME }}
          E2E_COMMANDER_VALUES: ${{ vars.E2E_COMMANDER_VALUES }}
          E2E_COMMANDER_CA_CERT: ${{ secrets.E2E_COMMANDER_CA_CERT }}
          E2E_COMMANDER_AUTH_METHOD: ${{ vars.E2E_COMMANDER_AUTH_METHOD || 'x-auth-token' }}
          E2E_COMMANDER_API_PREFIX: ${{ vars.E2E_COMMANDER_API_PREFIX || '/api/v1' }}
          E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY: ${{ vars.E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY || 'false' }}
          E2E_COMMANDER_WAIT_TIMEOUT: ${{ vars.E2E_COMMANDER_WAIT_TIMEOUT || '60m' }}
          # After the cluster is Ready, Bootstrap connects to the master (SSH via the
          # bastion, kubeconfig fetch, in-process API tunnel) and enables the
          # modules-under-test from cluster_config (ModuleConfig + ModulePullOverride) —
          # so no separate enable-modules step is needed. Hence the SSH creds + the
          # module image tag (for modulePullOverride: "${E2E_MODULE_IMAGE_TAG}") here.
          E2E_COMMANDER_SSH_PRIVATE_KEY: ${{ secrets.E2E_COMMANDER_SSH_PRIVATE_KEY }}
          E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY: ${{ secrets.E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY }}
          E2E_COMMANDER_SSH_USER: ${{ vars.E2E_COMMANDER_SSH_USER }}
          E2E_COMMANDER_SSH_JUMP_HOST: ${{ vars.E2E_COMMANDER_SSH_JUMP_HOST }}
          E2E_COMMANDER_SSH_JUMP_USER: ${{ vars.E2E_COMMANDER_SSH_JUMP_USER }}
          E2E_MODULE_IMAGE_TAG: ${{ inputs.module_image_tag }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          # DVP: decode the base64 kubeconfig secret into inline content. Empty
          # for non-DVP providers (commander), which simply ignore it.
          E2E_DVP_BASE_CLUSTER_KUBECONFIG="$(printf '%s' "${E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64}" | base64 -d)"
          export E2E_DVP_BASE_CLUSTER_KUBECONFIG
          go run ./cmd/bootstrap-cluster

  run-tests:
    name: run-tests
    needs: [resolve, bootstrap]
    if: ${{ needs.bootstrap.result == 'success' }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 240
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v7
        with:
          clean: true

      - name: Checkout storage-e2e
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _storage-e2e
          clean: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.module_path }}/go.mod
          cache: false

      # DVP: inject the suite's connection env for e2e.Connect. The DVP provider
      # runs IN-PROCESS — it reaches the base cluster (directly via kubeconfig or
      # through an SSH tunnel), resolves the master VM IP and fetches the test
      # cluster's kubeconfig over SSH — so there is no kubeconfig artifact.
      # Gated on dvp (writing to $GITHUB_ENV), mirroring the commander step below.
      - name: Configure dvp connection
        if: ${{ inputs.cluster_provider == 'dvp' }}
        env:
          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE }}
          E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}
          E2E_DVP_BASE_CLUSTER_STORAGE_CLASS: ${{ secrets.E2E_DVP_BASE_CLUSTER_STORAGE_CLASS }}
          NAMESPACE: ${{ needs.resolve.outputs.namespace }}
          CLUSTER_CONFIG: ${{ github.workspace }}/${{ inputs.cluster_config }}
        run: |
          set -euo pipefail
          emit() { printf '%s=%s\n' "$1" "$2" >>"$GITHUB_ENV"; }
          emit_multiline() {
            local d="__E2E_EOF_${RANDOM}${RANDOM}__"
            { printf '%s<<%s\n' "$1" "$d"; printf '%s\n' "$2"; printf '%s\n' "$d"; } >>"$GITHUB_ENV"
          }
          emit E2E_TEST_CLUSTER_PROVIDER dvp
          emit E2E_CLUSTER_CONFIG_YAML_PATH "${CLUSTER_CONFIG}"
          emit E2E_DVP_BASE_CLUSTER_NAMESPACE "${NAMESPACE}"
          emit E2E_DVP_BASE_CLUSTER_SSH_USER "${E2E_DVP_BASE_CLUSTER_SSH_USER}"
          emit E2E_DVP_BASE_CLUSTER_SSH_HOST "${E2E_DVP_BASE_CLUSTER_SSH_HOST}"
          [ -n "${E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE:-}" ] && emit E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE "${E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE}" || true
          [ -n "${E2E_DVP_BASE_CLUSTER_STORAGE_CLASS:-}" ] && emit E2E_DVP_BASE_CLUSTER_STORAGE_CLASS "${E2E_DVP_BASE_CLUSTER_STORAGE_CLASS}" || true
          emit_multiline E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY "${E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY}"
          emit_multiline E2E_DVP_BASE_CLUSTER_KUBECONFIG "$(printf '%s' "${E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64}" | base64 -d)"

      # Commander: inject the suite's connection env. The commander connector runs
      # IN-PROCESS — it SSHes to the master via the bastion, fetches the kubeconfig
      # off the master and opens an API tunnel — so there is no kubeconfig artifact
      # and no external SSH tunnel. (Module enablement already happened in Bootstrap.)
      # ALL commander wiring lives in this gated step (writing to $GITHUB_ENV), so for
      # other providers the "Run E2E tests" step keeps its exact environment.
      - name: Configure commander connection
        if: ${{ inputs.cluster_provider == 'commander' }}
        env:
          E2E_COMMANDER_URL: ${{ secrets.E2E_COMMANDER_URL }}
          E2E_COMMANDER_TOKEN: ${{ secrets.E2E_COMMANDER_TOKEN }}
          E2E_COMMANDER_CA_CERT: ${{ secrets.E2E_COMMANDER_CA_CERT }}
          E2E_COMMANDER_SSH_PRIVATE_KEY: ${{ secrets.E2E_COMMANDER_SSH_PRIVATE_KEY }}
          E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY: ${{ secrets.E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY }}
          E2E_COMMANDER_SSH_USER: ${{ vars.E2E_COMMANDER_SSH_USER }}
          E2E_COMMANDER_SSH_JUMP_HOST: ${{ vars.E2E_COMMANDER_SSH_JUMP_HOST }}
          E2E_COMMANDER_SSH_JUMP_USER: ${{ vars.E2E_COMMANDER_SSH_JUMP_USER }}
          E2E_COMMANDER_AUTH_METHOD: ${{ vars.E2E_COMMANDER_AUTH_METHOD || 'x-auth-token' }}
          E2E_COMMANDER_API_PREFIX: ${{ vars.E2E_COMMANDER_API_PREFIX || '/api/v1' }}
          E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY: ${{ vars.E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY || 'false' }}
          NAMESPACE: ${{ needs.resolve.outputs.namespace }}
          CLUSTER_CONFIG: ${{ github.workspace }}/${{ inputs.cluster_config }}
        run: |
          set -euo pipefail
          emit() { printf '%s=%s\n' "$1" "$2" >>"$GITHUB_ENV"; }
          emit_multiline() {
            local d="__E2E_EOF_${RANDOM}${RANDOM}__"
            { printf '%s<<%s\n' "$1" "$d"; printf '%s\n' "$2"; printf '%s\n' "$d"; } >>"$GITHUB_ENV"
          }
          # Drive the suite's connect through the clusterprovider (commander
          # implements Connect); the suite intercepts before the legacy
          # TEST_CLUSTER_CREATE_MODE switch. The mode is still set to a valid value
          # because the consumer suite + ValidateEnvironment require a non-empty one.
          emit E2E_TEST_CLUSTER_PROVIDER commander
          emit E2E_CLUSTER_CONFIG_YAML_PATH "${CLUSTER_CONFIG}"
          emit TEST_CLUSTER_CREATE_MODE commander
          emit TEST_CLUSTER_NAMESPACE "${NAMESPACE}"
          emit E2E_COMMANDER_CLUSTER_NAME "${NAMESPACE}"
          emit E2E_COMMANDER_URL "${E2E_COMMANDER_URL}"
          emit E2E_COMMANDER_TOKEN "${E2E_COMMANDER_TOKEN}"
          emit E2E_COMMANDER_AUTH_METHOD "${E2E_COMMANDER_AUTH_METHOD}"
          emit E2E_COMMANDER_API_PREFIX "${E2E_COMMANDER_API_PREFIX}"
          emit E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY "${E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY}"
          emit E2E_COMMANDER_SSH_USER "${E2E_COMMANDER_SSH_USER}"
          emit E2E_COMMANDER_SSH_JUMP_HOST "${E2E_COMMANDER_SSH_JUMP_HOST}"
          emit E2E_COMMANDER_SSH_JUMP_USER "${E2E_COMMANDER_SSH_JUMP_USER}"
          emit_multiline E2E_COMMANDER_SSH_PRIVATE_KEY "${E2E_COMMANDER_SSH_PRIVATE_KEY}"
          [ -n "${E2E_COMMANDER_CA_CERT:-}" ] && emit_multiline E2E_COMMANDER_CA_CERT "${E2E_COMMANDER_CA_CERT}" || true
          [ -n "${E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY:-}" ] && emit_multiline E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY "${E2E_COMMANDER_SSH_JUMP_PRIVATE_KEY}" || true

      # NOTE: module enablement is no longer a separate step — the commander
      # provider's Bootstrap enables the modules-under-test from cluster_config as
      # part of bringing the cluster up (see cmd/bootstrap-cluster / the bootstrap
      # job above). The step above only injects the suite's connection env.

      - name: Run E2E tests
        id: run_tests
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_MODULE_PATH: ${{ inputs.module_path }}
          E2E_TEST_PACKAGE: ${{ inputs.test_package }}
          E2E_GINKGO_LABEL_FILTER: ${{ needs.resolve.outputs.ginkgo_filter }}
          E2E_STORAGE_E2E_DIR: ${{ github.workspace }}/_storage-e2e
          E2E_GO_TEST_TIMEOUT: "3h30m"
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          bash _storage-e2e/.github/scripts/e2e-run-tests.sh

      - name: Upload E2E logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-logs-${{ inputs.module_slug }}-pr${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}/e2e-test-output.log
          retention-days: 7
          if-no-files-found: ignore

  teardown:
    name: teardown
    needs: [resolve, bootstrap, run-tests]
    if: ${{ always() && needs.bootstrap.result == 'success' && needs.resolve.outputs.keep_cluster != 'true' }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 60
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v7
        with:
          clean: true

      - name: Checkout storage-e2e
        uses: actions/checkout@v7
        with:
          repository: deckhouse/storage-e2e
          ref: ${{ inputs.storage_e2e_ref }}
          path: _storage-e2e
          clean: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: _storage-e2e/go.mod
          cache: false

      - name: Prune stale workspace caches
        run: bash _storage-e2e/.github/scripts/e2e-prune-workspace.sh

      - name: Remove cluster
        working-directory: _storage-e2e
        env:
          GOMODCACHE: ${{ runner.temp }}/e2e-gomodcache
          GOCACHE: ${{ runner.temp }}/e2e-gocache
          GOPROXY: ${{ secrets.GOPROXY }}
          E2E_TEST_CLUSTER_PROVIDER: ${{ inputs.cluster_provider }}
          E2E_CLUSTER_CONFIG_YAML_PATH: ${{ github.workspace }}/${{ inputs.cluster_config }}
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL || 'info' }}
          # DVP provider env (used when cluster_provider == dvp).
          E2E_DVP_BASE_CLUSTER_SSH_USER: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_USER }}
          E2E_DVP_BASE_CLUSTER_SSH_HOST: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_HOST }}
          E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PASSPHRASE }}
          E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY: ${{ secrets.E2E_DVP_BASE_CLUSTER_SSH_PRIVATE_KEY }}
          E2E_DVP_BASE_CLUSTER_NAMESPACE: ${{ needs.resolve.outputs.namespace }}
          # KUBECONFIG secret is base64-encoded; decoded to inline content below.
          E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64: ${{ secrets.E2E_DVP_BASE_CLUSTER_KUBECONFIG }}
          # Commander provider env (used when cluster_provider == commander).
          # The cluster name MUST match the bootstrap job so the right cluster
          # is deleted: both use the per-PR namespace as the cluster name.
          E2E_COMMANDER_URL: ${{ secrets.E2E_COMMANDER_URL }}
          E2E_COMMANDER_TOKEN: ${{ secrets.E2E_COMMANDER_TOKEN }}
          E2E_COMMANDER_CLUSTER_NAME: ${{ needs.resolve.outputs.namespace }}
          E2E_COMMANDER_TEMPLATE_NAME: ${{ secrets.E2E_COMMANDER_TEMPLATE_NAME }}
          E2E_COMMANDER_CA_CERT: ${{ secrets.E2E_COMMANDER_CA_CERT }}
          E2E_COMMANDER_AUTH_METHOD: ${{ vars.E2E_COMMANDER_AUTH_METHOD || 'x-auth-token' }}
          E2E_COMMANDER_API_PREFIX: ${{ vars.E2E_COMMANDER_API_PREFIX || '/api/v1' }}
          E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY: ${{ vars.E2E_COMMANDER_INSECURE_SKIP_TLS_VERIFY || 'false' }}
          E2E_COMMANDER_WAIT_TIMEOUT: ${{ vars.E2E_COMMANDER_WAIT_TIMEOUT || '60m' }}
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"
          # DVP: decode the base64 kubeconfig secret into inline content. Empty
          # for non-DVP providers (commander), which simply ignore it.
          E2E_DVP_BASE_CLUSTER_KUBECONFIG="$(printf '%s' "${E2E_DVP_BASE_CLUSTER_KUBECONFIG_B64}" | base64 -d)"
          export E2E_DVP_BASE_CLUSTER_KUBECONFIG
          go run ./cmd/remove-cluster
