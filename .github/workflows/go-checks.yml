name: Go checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  GOWORK: "off"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          only-new-issues: true
          args: --timeout=5m

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by actions/upload-code-coverage (GitHub Code Quality coverage,
      # public preview). Without it the upload step fails with insufficient scope.
      code-quality: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests with coverage
        run: |
          go test -race -covermode=atomic \
            -coverprofile=coverage.out \
            -coverpkg=./internal/...,./pkg/... \
            ./internal/... ./pkg/...

      - name: Generate coverage reports
        if: always()
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html

      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo "### Library coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage.out | tail -n 1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Convert coverage to Cobertura XML
        if: always()
        run: |
          go install github.com/boumenot/gocover-cobertura@latest
          "$(go env GOPATH)/bin/gocover-cobertura" < coverage.out > coverage.xml

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Go
          label: code-coverage/go

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
            coverage.html
            coverage.xml
          if-no-files-found: ignore

  coverage-summary:
    name: Coverage summary (CCS)
    needs: unit-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          hide_branch_rate: true
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'
          fail_below_min: false

      - name: Write coverage to job summary
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Extract coverage percent (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          pct=$(grep -E '^total:' coverage.txt | grep -Eo '[0-9]+(\.[0-9]+)?' | tail -n1)
          echo "COVERAGE_PCT=${pct}" >> "$GITHUB_ENV"

      - name: Publish coverage badge to gist (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 9da59ba8cd10aa883e7b143a68a82c06
          filename: storage-e2e-coverage.json
          label: coverage
          message: ${{ env.COVERAGE_PCT }}%
          valColorRange: ${{ env.COVERAGE_PCT }}
          minColorRange: 50
          maxColorRange: 90
