name: Go checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# third_party/ and go.work are local-only (gitignored). Force module mode so CI
# builds strictly from go.mod and never tries to resolve the local workspace.
env:
  GOWORK: "off"

jobs:
  lint:
    name: Lint (new code only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required so golangci-lint can diff against the
          # merge-base with the target branch and report only new issues.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Report only issues introduced by this change relative to main,
          # so the existing backlog does not block PRs.
          only-new-issues: true
          args: --timeout=5m

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Only library packages are tested here. tests/* are Ginkgo e2e suites that
      # require real infrastructure (SSH/VMs/base cluster) and must not run here.
      - name: Run unit tests with coverage
        run: |
          go test -race -covermode=atomic \
            -coverprofile=coverage.out \
            -coverpkg=./internal/...,./pkg/... \
            ./internal/... ./pkg/...

      - name: Generate coverage reports
        if: always()
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html

      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo "### Library coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage.out | tail -n 1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
            coverage.html
          if-no-files-found: ignore
