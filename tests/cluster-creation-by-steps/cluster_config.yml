# Test nested cluster configuration
clusterDefinition:
  masters: # Master nodes configuration
    - hostname: "master-1"
      hostType: "vm"
      role: "master"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      auth: # TODO move to envvars        
        method: "ssh-key"
        user: "cloud"
        sshKey: "ssh-rsa  ayakubov@MacBook-Pro-Alexey.local"
      cpu: 4
      ram: 8
      diskSize: 30
  workers: # Worker nodes configuration // TODO implement logic allowing to deploy different number of workes and masters with the same config.
    - hostname: "worker-1"
      hostType: "vm"
      role: "worker"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      auth:
        method: "ssh-key" 
        user: "cloud"
        sshKey: "ssh-rsa  ayakubov@MacBook-Pro-Alexey.local"
      cpu: 2
      ram: 6
      diskSize: 30
    - hostname: "worker-2"
      hostType: "vm"
      role: "worker"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      auth:
        method: "ssh-key"
        user: "cloud"
        sshKey: "ssh-rsa  ayakubov@MacBook-Pro-Alexey.local"
      cpu: 2
      ram: 6
      diskSize: 30
  # DKP parameters
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    licenseKey: "" # TODO Move to envvars
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    namespace: "e2e-nested-1" # TODO Move to a higher level
    storageClass: "rsc-test-r2-local" # TODO Move to a higher level
    # Module configuration
    modules:
      - name: "snapshot-controller" # TODO add MPO
        version: 1
        enabled: true
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        dependencies:
          - "snapshot-controller"
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        dependencies:
          - "sds-local-volume"
      - name: "sds-replicated-volume"
        version: 1
        enabled: true
        dependencies:
          - "sds-node-configurator"
