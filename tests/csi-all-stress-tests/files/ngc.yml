---
apiVersion: deckhouse.io/v1alpha1
kind: NodeGroupConfiguration
metadata:
  name: iscsi-and-multipath-install-for-redos-like.sh
spec:
  weight: 98
  nodeGroups: ["*"]
  bundles: ["centos", "redos"]
  content: |
    # Copyright 2024 Flant JSC
    #
    # Licensed under the Apache License, Version 2.0 (the "License");
    # you may not use this file except in compliance with the License.
    # You may obtain a copy of the License at
    #
    #     http://www.apache.org/licenses/LICENSE-2.0
    #
    # Unless required by applicable law or agreed to in writing, software
    # distributed under the License is distributed on an "AS IS" BASIS,
    # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
    # See the License for the specific language governing permissions and
    # limitations under the License.

    # data nodes checksum to force bashible execution on nodes list change
    # {{ $.Values.csiYadroTatlinUnified.internal.dataNodesChecksum }}

    export ISCSI_NODE_READY_LABEL="storage.deckhouse.io/node-ready-for-iscsi"
    export kubeconfig="/etc/kubernetes/kubelet.conf"

    export MULTIPATH_MAIN_CONF="/etc/multipath.conf"

    _on_multipath_config_changed() {
      if systemctl is-enabled --quiet multipathd 2>/dev/null; then
        systemctl reload multipathd
      fi
    }
    bb-event-on 'bb-sync-file-changed' '_on_multipath_config_changed'

    ensure_main_multipath_conf() {
      if [[ ! -f "${MULTIPATH_MAIN_CONF}" ]]; then
        bb-sync-file "${MULTIPATH_MAIN_CONF}" - <<'EOF'
    defaults {
        user_friendly_names yes
    }
    EOF
      fi
    }


    install_packages() {
      yum install -y iscsi-initiator-utils device-mapper-multipath || dnf install -y iscsi-initiator-utils device-mapper-multipath
    }

    enable_services() {
      systemctl enable --now multipathd iscsid
      systemctl start multipathd iscsid
      /sbin/mpathconf --enable --user_friendly_names y
    }

    # Track success of all steps
    all_success=true

    if ! install_packages; then
      echo "Failed to install packages, skipping configuration."
      all_success=false
    fi

    if ! ensure_main_multipath_conf; then
      echo "Failed to ensure main multipath conf, skipping configuration."
      all_success=false
    fi

    if ! enable_services; then
      echo "Failed to enable services, skipping configuration."
      all_success=false
    fi

    # Only label node if all previous commands succeeded
    if [ "$all_success" = true ]; then
      bb-kubectl --kubeconfig $kubeconfig label nodes "$(hostname)" ${ISCSI_NODE_READY_LABEL}="true" --overwrite
    else
      echo "Skipping node labeling due to previous errors."
    fi



---
apiVersion: deckhouse.io/v1alpha1
kind: NodeGroupConfiguration
metadata:
  name: iscsi-and-multipath-install-for-debian-and-alt-like.sh
spec:
  weight: 98
  nodeGroups: ["*"]
  bundles: ["ubuntu-lts", "debian", "astra", "altlinux"]
  content: |
    # Copyright 2024 Flant JSC
    #
    # Licensed under the Apache License, Version 2.0 (the "License");
    # you may not use this file except in compliance with the License.
    # You may obtain a copy of the License at
    #
    #     http://www.apache.org/licenses/LICENSE-2.0
    #
    # Unless required by applicable law or agreed to in writing, software
    # distributed under the License is distributed on an "AS IS" BASIS,
    # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
    # See the License for the specific language governing permissions and
    # limitations under the License.

    # data nodes checksum to force bashible execution on nodes list change
    # {{ $.Values.csiYadroTatlinUnified.internal.dataNodesChecksum }}

    export ISCSI_NODE_READY_LABEL="storage.deckhouse.io/node-ready-for-iscsi"
    export MULTIPATH_MAIN_CONF="/etc/multipath.conf"
    export kubeconfig="/etc/kubernetes/kubelet.conf"

    _on_multipath_config_changed() {
      if systemctl is-enabled --quiet multipathd 2>/dev/null; then
        systemctl reload multipathd
      fi
    }
    bb-event-on 'bb-sync-file-changed' '_on_multipath_config_changed'
    
    ensure_main_multipath_conf() {
      if [[ ! -f "${MULTIPATH_MAIN_CONF}" ]]; then
        bb-sync-file "${MULTIPATH_MAIN_CONF}" - <<'EOF'
          defaults {
              user_friendly_names yes
          }
    EOF
      fi
    }

    install_packages() {
      apt-get -y install multipath-tools open-iscsi
    }

    enable_services() {
      systemctl enable --now multipathd iscsid
      systemctl start multipathd iscsid
    }

    # Track success of all steps
    all_success=true

    if ! install_packages; then
      echo "Failed to install packages, skipping configuration."
      all_success=false
    fi

    if ! ensure_main_multipath_conf; then
      echo "Failed to ensure main multipath conf, skipping configuration."
      all_success=false
    fi

    if ! enable_services; then
      echo "Failed to enable services, skipping configuration."
      all_success=false
    fi

    # Only label node if all previous commands succeeded
    if [ "$all_success" = true ]; then
      bb-kubectl --kubeconfig $kubeconfig label nodes "$(hostname)" ${ISCSI_NODE_READY_LABEL}="true" --overwrite
    else
      echo "Skipping node labeling due to previous errors."
    fi

