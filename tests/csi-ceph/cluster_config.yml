# csi-ceph smoke testkit: 3 workers to let a Rook Ceph cluster come up in a
# realistic layout (1 mon/mgr, 3 OSDs by default). Masters are untainted so
# the mon/mgr can land there on tiny clusters as well.
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-3"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    # Only the bare minimum is pre-enabled here. EnsureCephStorageClass will
    # turn on sds-elastic + csi-ceph (and sds-local-volume as OSD backing
    # automatically, unless CSI_CEPH_OSD_STORAGE_CLASS is provided).
    modules:
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        dependencies: []
