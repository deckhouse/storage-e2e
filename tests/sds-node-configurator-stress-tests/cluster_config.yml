# Nested cluster for sds-node-configurator max-VG stress (light topology: 1 master + 1 worker).
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 60
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 24.04 6.8.0-53-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 30
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        dependencies: []
