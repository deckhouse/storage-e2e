# Test nested cluster configuration
clusterDefinition:
  masters: # Master nodes configuration
    - hostname: "master-1"
      hostType: "vm"
      role: "master"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 30
  workers: # Worker nodes configuration // TODO implement logic allowing to deploy different number of workes and masters with the same config.
    - hostname: "worker-1"
      hostType: "vm"
      role: "worker"
      osType: "RedOS 8.0 6.6.26-1.red80.x86_64"
      cpu: 2
      coreFraction: 50
      ram: 6
      diskSize: 30
    - hostname: "worker-2"
      hostType: "vm"
      role: "worker"
      osType: "RedOS 7.3.6 5.15.78-2.el7.3.x86_64"
      cpu: 2
      coreFraction: 50
      ram: 6
      diskSize: 30
    - hostname: "worker-3"
      hostType: "vm"
      role: "worker"
      osType: "Ubuntu 24.04 6.8.0-53-generic"
      cpu: 2
      coreFraction: 50
      ram: 6
      diskSize: 30
  # DKP parameters
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    # Module configuration
    modules:
      - name: "snapshot-controller" # TODO add MPO
        version: 1
        enabled: true
        modulePullOverride: "main" # imageTag for ModulePullOverride. Main is default value, used if not specified.
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        dependencies:
          - "snapshot-controller"
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        dependencies:
          - "sds-local-volume"
      # - name: "sds-replicated-volume"
      #   version: 1
      #   enabled: true
      #   dependencies:
      #     - "sds-node-configurator"
